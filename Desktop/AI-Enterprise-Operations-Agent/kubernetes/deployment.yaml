apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-enterprise-platform
  namespace: ai-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-enterprise
  template:
    metadata:
      labels:
        app: ai-enterprise
    spec:
      containers:
      - name: backend
        image: ai-enterprise-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-secret
              key: api-key
        - name: DATABASE_URL
          value: "postgresql://user:pass@postgres-service:5432/ai_enterprise"
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-enterprise-service
spec:
  selector:
    app: ai-enterprise
  ports:
  - port: 80
    targetPort: 8000
  type: LoadBalancer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-enterprise-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: ai-enterprise.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-enterprise-service
            port:
              number: 80